spring.application.name=Hotel Management System

# =========================
# DATABASE CONFIGURATION
# =========================

spring.datasource.url=jdbc:mysql://localhost:3306/hotel_management?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / HIBERNATE
# =========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# =========================
# SERVER
# =========================

server.port=8081

jwt.secret=MySuperSecretKeyForHotelManagementSystem2026JwtAuthentication
jwt.expiration=86400000


